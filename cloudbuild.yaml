steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/seekreap-backend', '.']

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/seekreap-backend']

  # 3. Deploy to Cloud Run with secrets
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'seekreap-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/seekreap-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DB_NAME=seekreap_neon_db,DB_USER=neondb_owner,DB_HOST=ep-rapid-base-ai27r1sa-pooler.c-4.us-east-1.aws.neon.tech,DB_PORT=5432,DB_SSLMODE=require'
      - '--set-secrets'
      - 'DB_PASSWORD=neon-db-password:latest'

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/neon-db-password/versions/latest
    env: 'NEON_DB_PASSWORD'
